<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital ID Interoperability Map</title>
  <script src="https://unpkg.com/globe.gl"></script>
  <style>
    :root { --bg: #0c0c0f; --border: #2a2a32; --text: #e8e8ec; --text-dim: #8a8a96; --accent: #e8c547; --success: #4ade80; --blue: #60a5fa; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    .container { height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 16px 24px; background: rgba(12,12,15,0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; z-index: 100; }
    h1 { font-size: 1.1rem; }
    .subtitle { color: var(--text-dim); font-size: 0.8rem; }
    .back { color: var(--accent); text-decoration: none; font-size: 0.8rem; }
    #globeViz { flex: 1; }
    .legend { position: absolute; bottom: 24px; left: 24px; background: rgba(12,12,15,0.9); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; z-index: 10; }
    .legend-title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; margin-bottom: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    .info { position: absolute; top: 80px; right: 24px; background: rgba(12,12,15,0.95); border: 1px solid var(--border); border-radius: 10px; padding: 16px; max-width: 260px; z-index: 10; display: none; }
    .info.active { display: block; }
    .info-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; }
    .info-desc { font-size: 0.8rem; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back">← Back to Registry</a>
      <div>
        <h1>🌐 Digital ID Interoperability</h1>
        <p class="subtitle">Interactive Globe — Drag to rotate, scroll to zoom</p>
      </div>
    </div>
    <div id="globeViz"></div>
    <div class="legend">
      <div class="legend-title">Interoperability</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> EU (EUDI)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div> Nordic</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> North America</div>
      <div class="legend-item"><div class="legend-dot" style="background:#666;border:1px dashed #666"></div> Future Agreements</div>
    </div>
    <div class="info" id="info">
      <div class="info-title" id="infoTitle"></div>
      <div class="info-desc" id="infoDesc"></div>
    </div>
  </div>

  <script>
    const WORLD_GEOJSON = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson';
    
    const locations = [
      // US States
      { name: 'United States', lat: 37.09, lng: -95.71, color: '#60a5fa', type: 'us', desc: '13+ states with mDL in Apple/Google Wallet' },
      { name: 'Canada', lat: 56.13, lng: -106.34, color: '#60a5fa', type: 'us', desc: 'BC, Alberta, Manitoba digital IDs' },
      // EU
      { name: 'Germany', lat: 51.16, lng: 10.45, color: '#e8c547', type: 'eu', desc: 'EUDI Wallet launch 2026-2027' },
      { name: 'France', lat: 46.22, lng: 2.21, color: '#e8c547', type: 'eu', desc: 'France Identité + EUDI' },
      { name: 'Italy', lat: 41.87, lng: 12.56, color: '#e8c547', type: 'eu', desc: 'IT-Wallet pilot' },
      { name: 'Spain', lat: 40.46, lng: -3.75, color: '#e8c547', type: 'eu', desc: 'Cl@ve + EUDI' },
      { name: 'Netherlands', lat: 52.13, lng: 5.29, color: '#e8c547', type: 'eu', desc: 'DigiD + EUDI' },
      { name: 'Portugal', lat: 39.4, lng: -8.2, color: '#e8c547', type: 'eu', desc: 'EUDI pilot' },
      { name: 'United Kingdom', lat: 55.37, lng: -3.43, color: '#e8c547', type: 'uk', desc: 'GOV.UK One Login' },
      // Nordic
      { name: 'Sweden', lat: 60.12, lng: 18.64, color: '#4ade80', type: 'nordic', desc: 'BankID - 94% adoption' },
      { name: 'Norway', lat: 60.47, lng: 8.46, color: '#4ade80', type: 'nordic', desc: 'BankID, EUDI planned' },
      { name: 'Denmark', lat: 56.26, lng: 9.5, color: '#4ade80', type: 'nordic', desc: 'NemID/MitID' },
      { name: 'Finland', lat: 61.92, lng: 25.75, color: '#4ade80', type: 'nordic', desc: 'Findy + EUDI' },
      { name: 'Estonia', lat: 58.59, lng: 25.01, color: '#4ade80', type: 'nordic', desc: 'e-Residency, X-Road' },
      // Asia Pacific
      { name: 'Australia', lat: -25.27, lng: 133.77, color: '#60a5fa', type: 'apac', desc: 'myID, Austroads framework' },
      { name: 'New Zealand', lat: -40.9, lng: 174.88, color: '#60a5fa', type: 'apac', desc: 'Digital ID framework' },
      { name: 'Japan', lat: 36.2, lng: 138.25, color: '#60a5fa', type: 'apac', desc: 'Individual Number Card' },
      { name: 'Singapore', lat: 1.35, lng: 103.81, color: '#60a5fa', type: 'apac', desc: 'SingPass - 5M+ users' },
      { name: 'India', lat: 20.59, lng: 78.96, color: '#60a5fa', type: 'apac', desc: 'Aadhaar - 1.3B enrolled' },
      { name: 'China', lat: 35.86, lng: 104.19, color: '#60a5fa', type: 'apac', desc: 'Cyber ID - 16M downloads' },
      // Africa / Other
      { name: 'Kenya', lat: -0.02, lng: 37.9, color: '#60a5fa', type: 'africa', desc: 'eCitizen platform' },
      { name: 'Brazil', lat: -14.23, lng: -51.92, color: '#60a5fa', type: 'latam', desc: 'Gov.br - 166M Gold users' },
    ];
    
    const arcs = [
      // Nordic connections
      { src: 'Sweden', dst: 'Norway', color: '#4ade80' },
      { src: 'Sweden', dst: 'Denmark', color: '#4ade80' },
      { src: 'Sweden', dst: 'Finland', color: '#4ade80' },
      { src: 'Sweden', dst: 'Estonia', color: '#4ade80' },
      // EU connections
      { src: 'Germany', dst: 'France', color: '#e8c547' },
      { src: 'Germany', dst: 'Italy', color: '#e8c547' },
      { src: 'Germany', dst: 'Spain', color: '#e8c547' },
      { src: 'Germany', dst: 'Netherlands', color: '#e8c547' },
      { src: 'Germany', dst: 'United Kingdom', color: '#e8c547' },
      { src: 'Germany', dst: 'Portugal', color: '#e8c547' },
      // North America
      { src: 'United States', dst: 'Canada', color: '#60a5fa' },
      // APAC
      { src: 'Australia', dst: 'New Zealand', color: '#666' },
      // EU-Canada
      { src: 'Germany', dst: 'Canada', color: '#666' },
    ];
    
    const elem = document.getElementById('globeViz');
    const world = Globe()
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
      .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
      .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
      .width(elem.clientWidth)
      .height(elem.clientHeight)
      .polygonCapColor(() => 'rgba(30,30,40,0.6)')
      .polygonSideColor(() => 'rgba(30,30,40,0.3)')
      .polygonStrokeColor(() => '#2a2a32')
      .pointsData(locations)
      .pointLat(d => d.lat)
      .pointLng(d => d.lng)
      .pointColor(d => d.color)
      .pointAltitude(0.02)
      .pointRadius(0.5)
      .pointLabel(d => `<div style="background:#141418;border:1px solid #2a2a32;border-radius:6px;padding:8px 12px;color:#e8e8ec;font-size:12px">
        <strong>${d.name}</strong><br>
        <span style="color:#8a8a96;font-size:11px">${d.desc}</span>
      </div>`)
      .arcsData(arcs)
      .arcStartLat(d => locations.find(l => l.name === d.src)?.lat || 0)
      .arcStartLng(d => locations.find(l => l.name === d.src)?.lng || 0)
      .arcEndLat(d => locations.find(l => l.name === d.dst)?.lat || 0)
      .arcEndLng(d => locations.find(l => l.name === d.dst)?.lng || 0)
      .arcColor(d => d.color)
      .arcStrokeLength(0.5)
      .arcDashLength(0.4)
      .arcDashGap(0.2)
      .arcDashAnimateTime(2000)
      .arcAltitude(0.04)
      .onPointClick(d => {
        document.getElementById('infoTitle').textContent = d.name;
        document.getElementById('infoDesc').textContent = d.desc;
        document.getElementById('info').classList.add('active');
      })
      (elem);
    
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.5;
    world.pointOfView({ lat: 30, lng: 0, altitude: 2.5 });
    
    window.addEventListener('resize', () => {
      world.width(elem.clientWidth).height(elem.clientHeight);
    });
  </script>
</body>
</html>
