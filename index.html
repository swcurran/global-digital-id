<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Digital ID Landscape</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1 id="pageTitle">Global Digital ID</h1>
      </div>
      <div class="toolbar-right">
        <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">🌙</button>
        <a href="map.html" class="toolbar-link">🗺️ Map</a>
        <a href="usecases.html" class="toolbar-link">🔐 Use Cases</a>
        <a href="summary.html" class="toolbar-link">Summary</a>
      </div>
    </div>
    
    <div class="toolbar-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search...">
      <div class="filter-group" id="statusFilters"></div>
      <div class="filter-group" id="regionFilters"></div>
      <select class="sort-select" id="walletTypeSelect">
        <option value="all">All Wallets</option>
      </select>
      <select class="sort-select" id="credFormatSelect">
        <option value="all">All Formats</option>
      </select>
      <select class="sort-select" id="sortSelect">
        <option value="name">Name</option>
        <option value="region">Region</option>
        <option value="status">Status</option>
      </select>
    </div>
    
    <div class="exec-bar" id="execBar"></div>
    
    <div class="cards" id="cards"></div>
    <div class="section" id="nodeviceSection"></div>
  </div>
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModal()">x</button>
      </div>
      <div class="modal-body">
        <div class="modal-grid">
          <div class="modal-left">
            <div class="modal-section"><p id="modalDesc"></p></div>
            <div class="modal-section"><h3>Technology</h3><p id="modalTech"></p></div>
            <div class="modal-section"><h3>Details</h3><ul class="modal-list" id="modalDetails"></ul></div>
            <div class="modal-section" id="modalIssuingSection" style="display:none;"><h3>Issuing Authorities</h3><div id="modalIssuing"></div></div>
          </div>
          <div class="modal-right">
            <div class="modal-section"><h3>No-Device</h3><ul class="modal-list" id="modalNoDevice"></ul></div>
            <div class="modal-section"><h3>Metrics</h3><div class="modal-grid" id="modalStats" style="grid-template-columns: 1fr;"></div></div>
            <div class="modal-section" id="modalAcceptedSection" style="display:none;"><h3>Accepted Credentials</h3><div id="modalAccepted"></div></div>
          </div>
        </div>
        <div class="modal-section" id="modalLinkSection" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);"><div class="modal-link"><a id="modalLink" href="#" target="_blank">🔗 Visit Official Website</a></div></div>
      </div>
    </div>
  </div>
  <script>
    let appData = null;
    let filter = 'all', model = 'all', region = 'all', walletType = 'all', credentialFormat = 'all', sortBy = 'name', searchQuery = '';
    
    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'light' ? '☀️' : '🌙';
    
    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'light' ? '☀️' : '🌙';
    });
    
    async function loadData() {
      try {
        const resp = await fetch('data.json');
        appData = await resp.json();
        initApp();
      } catch(e) {
        document.getElementById('cards').innerHTML = '<div class="loading">Error loading data.json. Make sure you are running from a local server.</div>';
      }
    }
    
    function initApp() {
      document.getElementById('pageTitle').textContent = appData.meta.title;
      
      // Check URL params for pre-selected filters
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('region')) {
        region = urlParams.get('region');
      }
      if (urlParams.has('filter')) {
        filter = urlParams.get('filter');
      }
      
      // Executive Summary - compact stats bar
      const jur = appData.jurisdictions;
      const total = jur.length;
      const production = jur.filter(j => j.status === 'production').length;
      const development = jur.filter(j => j.status === 'development').length;
      
      document.getElementById('execBar').innerHTML = `
        <div class="exec-bar-stat"><span class="exec-bar-stat-value">${total}</span> <span class="exec-bar-stat-label">Jurisdictions</span></div>
        <div class="exec-bar-stat"><span class="exec-bar-stat-value">${production}</span> <span class="exec-bar-stat-label">Live</span></div>
        <div class="exec-bar-stat"><span class="exec-bar-stat-value">${development}</span> <span class="exec-bar-stat-label">In Dev</span></div>
      `;
      
      renderFilters();
      renderCards();
    }
    
    function renderFilters() {
      const regions = [...new Set(appData.jurisdictions.map(j => j.region))];
      const walletTypes = [...new Set(appData.jurisdictions.map(j => j.walletType).filter(Boolean))];
      const credFormats = [...new Set(appData.jurisdictions.map(j => j.credentialFormat).filter(Boolean))];
      
      document.getElementById('statusFilters').innerHTML = `
        <button class="filter-btn ${filter === 'all' ? 'active' : ''}" data-filter="all">All</button>
        <button class="filter-btn ${filter === 'production' ? 'active' : ''}" data-filter="production">Live</button>
        <button class="filter-btn ${filter === 'development' ? 'active' : ''}" data-filter="dev">Dev</button>
      `;
      document.getElementById('regionFilters').innerHTML = `
        <button class="filter-btn ${region === 'all' ? 'active' : ''}" data-region="all">All</button>
        ${regions.map(r => `<button class="filter-btn ${region === r ? 'active' : ''}" data-region="${r}">${r.toUpperCase()}</button>`).join('')}
      `;
      
      // Wallet type dropdown
      const wtSelect = document.getElementById('walletTypeSelect');
      wtSelect.innerHTML = '<option value="all">All Wallets</option>' + 
        walletTypes.map(t => `<option value="${t}">${t}</option>`).join('');
      wtSelect.value = walletType;
      
      // Credential format dropdown
      const cfSelect = document.getElementById('credFormatSelect');
      cfSelect.innerHTML = '<option value="all">All Formats</option>' + 
        credFormats.map(f => `<option value="${f}">${f}</option>`).join('');
      cfSelect.value = credentialFormat;
      
      document.querySelectorAll('#statusFilters .filter-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('#statusFilters .filter-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); filter = b.dataset.filter; renderCards();
      });
      document.querySelectorAll('#regionFilters .filter-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('#regionFilters .filter-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); region = b.dataset.region; renderCards();
      });
    }
    
    function renderCards() {
      const filtered = appData.jurisdictions.filter(j => {
        const f = filter === 'all' || j.status === filter;
        const r = region === 'all' || j.region === region;
        const wt = walletType === 'all' || j.walletType === walletType;
        const cf = credentialFormat === 'all' || j.credentialFormat === credentialFormat;
        
        // Search filter
        let s = true;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          s = j.name.toLowerCase().includes(q) || 
              j.technology.toLowerCase().includes(q) ||
              (j.description && j.description.toLowerCase().includes(q)) ||
              (j.parent && j.parent.toLowerCase().includes(q));
        }
        
        return f && r && wt && cf && s;
      }).sort((a, b) => {
        // Sort
        if (sortBy === 'name') {
          if (a.isSubnational !== b.isSubnational) return a.isSubnational ? 1 : -1;
          if (a.isSubnational && a.parent !== b.parent) return a.parent.localeCompare(b.parent);
          return a.name.localeCompare(b.name);
        }
        if (sortBy === 'region') {
          if (a.region !== b.region) return a.region.localeCompare(b.region);
          return a.name.localeCompare(b.name);
        }
        if (sortBy === 'status') {
          const statusOrder = { 'production': 0, 'mixed': 1, 'pilot': 2, 'development': 3, 'unknown': 4 };
          if (a.status !== b.status) return (statusOrder[a.status] ?? 5) - (statusOrder[b.status] ?? 5);
          return a.name.localeCompare(b.name);
        }
        return 0;
      });
      
      document.getElementById('cards').innerHTML = `<div style="grid-column: 1/-1; margin-bottom: 12px; color: var(--text-dim); font-size: 0.75rem;">Showing ${filtered.length} jurisdictions</div>` + filtered.map(j => `
        <div class="card ${j.isSubnational ? 'is-subnational' : ''}" onclick="openModal('${j.name.replace(/'/g, "\\'")}')">
          <div class="card-header">
            <div class="card-title-group">
              <span class="card-flag">${getFlag(j.flag)}</span>
              <div>
                <div class="card-title">${j.name}</div>
                <div class="card-subtitle">${j.isSubnational ? j.parent : j.technology}</div>
              </div>
            </div>
            <div class="card-badges">
              <span class="badge ${j.status === 'production' ? 'badge-prod' : 'badge-spec'}">${j.status === 'production' ? 'Live' : 'Dev'}</span>
              ${j.isSubnational ? '<span class="badge badge-sub">Sub</span>' : ''}
            </div>
          </div>
          ${j.isSubnational ? `<div class="parent-jurisdiction">${j.parent}</div>` : ''}
          <div class="card-model"><strong>${j.walletType !== 'None' ? j.walletType + ' Wallet' : (j.issuanceModel === 'multiple' ? 'Multiple Providers' : j.issuanceModel === 'cloud' ? 'Cloud' : 'Single Issuer')}</strong> · ${j.credentialFormat || 'N/A'}</div>
          <div class="card-tech">${j.walletTech || ''}</div>
          <div class="card-desc">${j.description.substring(0, 90)}...</div>
          <div class="card-meta">${j.metrics.slice(0, 2).map(m => `<span>${m.label}: <strong>${m.value}</strong></span>`).join('')}</div>
        </div>
      `).join('');
    }
    
    window.openModal = function(name) {
      const j = appData.jurisdictions.find(x => x.name === name);
      if (!j) return;
      document.getElementById('modalTitle').innerHTML = `<span class="modal-flag">${getFlag(j.flag)}</span> ${j.name}`;
      document.getElementById('modalDesc').textContent = j.description;
      document.getElementById('modalTech').textContent = j.technology;
      document.getElementById('modalDetails').innerHTML = j.details.map(d => `<li>${d}</li>`).join('');
      document.getElementById('modalNoDevice').innerHTML = j.nodevice.map(n => `<li>${n}</li>`).join('');
      document.getElementById('modalStats').innerHTML = j.metrics.map(m => `<div class="modal-stat"><div class="modal-stat-value">${m.value}</div><div class="modal-stat-label">${m.label}</div></div>`).join('');
      // Issuing Authorities
      if (j.issuingAuthorities && j.issuingAuthorities.length > 0) {
        document.getElementById('modalIssuingSection').style.display = 'block';
        document.getElementById('modalIssuing').innerHTML = j.issuingAuthorities.map(a => 
          `<div class="authority-card"><div class="authority-name">${a.name}</div><div class="authority-type">${a.type}</div><div class="authority-creds">${(a.credentials || []).map(c => renderCredential(c)).join('')}</div></div>`
        ).join('');
      } else {
        document.getElementById('modalIssuingSection').style.display = 'none';
      }

      // Accepted Credentials
      if (j.acceptedCredentials && Object.keys(j.acceptedCredentials).length > 0) {
        document.getElementById('modalAcceptedSection').style.display = 'block';
        document.getElementById('modalAccepted').innerHTML = Object.entries(j.acceptedCredentials).map(([useCase, data]) => 
          `<div class="acceptance-card"><div class="acceptance-usecase">${useCase}</div><div class="acceptance-agency"><strong>Agency:</strong> ${data.agency}</div><div class="acceptance-types"><strong>Accepted:</strong> ${(data.acceptedTypes || []).map(t => renderCredential(t)).join('')}</div></div>`
        ).join('');
      } else {
        document.getElementById('modalAcceptedSection').style.display = 'none';
      }

      if (j.url) { document.getElementById('modalLink').href = j.url; document.getElementById('modalLinkSection').style.display = 'block'; }
      else document.getElementById('modalLinkSection').style.display = 'none';
      document.getElementById('modal').classList.add('active');
    };
    window.closeModal = function() { document.getElementById('modal').classList.remove('active'); };
    document.getElementById('modal').onclick = e => { if(e.target.id === 'modal') closeModal(); };
    document.onkeydown = e => { if(e.key === 'Escape') closeModal(); };
    
    function getFlag(code) {
      return `<img src="https://flagcdn.com/w40/${code}.png" srcset="https://flagcdn.com/w80/${code}.png 2x" alt="${code.toUpperCase()}" style="width:28px;height:20px;border-radius:2px;">`;
    }

    function getStatusBadge(status) {
      const colors = {
        'production': 'var(--success)',
        'pilot': 'var(--warning)',
        'development': 'var(--info)',
        'unknown': 'var(--text-mute)'
      }
    function renderCredential(cred) {
        // Handle string format (backward compat)
        if (typeof cred === 'string') {
            return `<span class="cred-pill">${cred}</span>`;
        }

        // Handle object format
        const statusBadge = getStatusBadge(cred.status);
        const issuerInfo = cred.issuer ? `<div class="cred-meta">🏛️ ${cred.issuer}</div>` : '';
        const networkInfo = cred.verificationNetwork ? `<div class="cred-meta">🔗 ${cred.verificationNetwork}</div>` : '';

        return `
            <div class="cred-pill cred-pill-detailed">
                <div class="cred-header">
                    <span class="cred-name">${cred.type}</span>
                    ${statusBadge}
                </div>
                ${issuerInfo}
                ${networkInfo}
            </div>
        `;
    }
;
      const labels = {
        'production': 'Production',
        'pilot': 'Pilot',
        'development': 'Development',
        'unknown': 'Unknown'
      };
      const color = colors[status] || colors['unknown'];
      const label = labels[status] || labels['unknown'];
      return `<span style="font-size:0.65rem;padding:2px 8px;background:${color};color:#fff;border-radius:4px;">${label}</span>`;
    }

    (cred) {
        // Handle string format (backward compat)
        if (typeof cred === 'string') {
            return `<span class="cred-pill">${cred}</span>`;
        }

        // Handle object format
        const statusBadge = getStatusBadge(cred.status);
        const issuerInfo = cred.issuer ? `<div class="cred-meta">🏛️ ${cred.issuer}</div>` : '';
        const networkInfo = cred.verificationNetwork ? `<div class="cred-meta">🔗 ${cred.verificationNetwork}</div>` : '';

        return `
            <div class="cred-pill cred-pill-detailed">
                <div class="cred-header">
                    <span class="cred-name">${cred.type}</span>
                    ${statusBadge}
                </div>
                ${issuerInfo}
                ${networkInfo}
            </div>
        `;
    }

    </span>`;
    }

    // Handle object format
    const statusBadge = getStatusBadge(cred.status);
    const issuerInfo = cred.issuer ? `<div class="cred-meta">🏛️ ${cred.issuer}</div>` : '';
    const networkInfo = cred.verificationNetwork ? `<div class="cred-meta">🔗 ${cred.verificationNetwork}</div>` : '';

    return `
        <div class="cred-pill cred-pill-detailed">
            <div class="cred-header">
                <span class="cred-name">${cred.type}</span>
                ${statusBadge}
            </div>
            ${issuerInfo}
            ${networkInfo}
        </div>
    `;
}</span>`;
      }
      const status = cred.status || 'unknown';
      const type = cred.type || cred;
      const issuer = cred.issuer ? `<div style="font-size:0.65rem;color:var(--text-mute);margin-top:2px;">${cred.issuer}</div>` : '';
      const network = cred.verificationNetwork ? `<div style="font-size:0.6rem;color:var(--text-dim);">via ${cred.verificationNetwork}</div>` : '';
      return `<div style="border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;background:var(--bg-card);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="font-weight:500;font-size:0.75rem;">${type}</span>${getStatusBadge(status)}</div>${issuer}${network}</div>`;
    }
    
    // Search and sort
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderCards();
    });
    
    document.getElementById('sortSelect').addEventListener('change', (e) => {
      sortBy = e.target.value;
      renderCards();
    });
    
    document.getElementById('walletTypeSelect').addEventListener('change', (e) => {
      walletType = e.target.value;
      renderCards();
    });
    
    document.getElementById('credFormatSelect').addEventListener('change', (e) => {
      credentialFormat = e.target.value;
      renderCards();
    });
    
    loadData();
  </script>
</body>
</html>
