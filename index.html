<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Digital ID Landscape</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0c0c0f; --bg-elevated: #141418; --bg-card: #1a1a1f; --bg-hover: #222228; --border: #2a2a32; --text: #e8e8ec; --text-dim: #8a8a96; --text-mute: #5a5a66; --accent: #e8c547; --success: #4ade80; --warning: #fbbf24; --info: #60a5fa; --radius: 6px; --radius-lg: 12px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
    header { margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
    h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
    .subtitle { color: var(--text-dim); font-size: 0.95rem; }
    .stats { display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
    .stat { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--accent); }
    .stat-label { font-size: 0.65rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em; }
    .filters-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-group { display: flex; gap: 3px; background: var(--bg-elevated); padding: 3px; border-radius: var(--radius); border: 1px solid var(--border); }
    .filter-btn { padding: 5px 10px; background: transparent; border: none; border-radius: 4px; color: var(--text-dim); font-family: inherit; font-size: 0.7rem; cursor: pointer; }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { background: var(--accent); color: var(--bg); font-weight: 500; }
    .filter-label { font-size: 0.65rem; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 4px; }
    .legend { display: flex; gap: 14px; margin-bottom: 16px; font-size: 0.7rem; color: var(--text-dim); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-dot.prod { background: var(--success); }
    .legend-dot.spec { background: var(--warning); }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 36px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; cursor: pointer; transition: all 0.2s; }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .card.is-subnational { margin-left: 16px; border-left: 3px solid var(--info); }
    .card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .card-title-group { display: flex; align-items: center; gap: 8px; }
    .card-flag { width: 28px; height: 19px; border-radius: 2px; object-fit: cover; }
    .card-title { font-weight: 600; font-size: 0.9rem; }
    .card-subtitle { font-size: 0.7rem; color: var(--text-dim); }
    .card-badges { display: flex; gap: 3px; }
    .badge { padding: 2px 6px; border-radius: 8px; font-size: 0.55rem; font-weight: 500; text-transform: uppercase; }
    .badge-prod { background: rgba(74, 222, 128, 0.15); color: var(--success); }
    .badge-spec { background: rgba(251, 191, 36, 0.15); color: var(--warning); }
    .badge-sub { background: rgba(96, 165, 250, 0.15); color: var(--info); }
    .card-model { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px; padding: 5px 7px; background: var(--bg-hover); border-radius: 4px; }
    .card-model strong { color: var(--text); }
    .card-desc { font-size: 0.75rem; color: var(--text-dim); line-height: 1.4; }
    .card-meta { display: flex; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 0.65rem; color: var(--text-mute); }
    .parent-jurisdiction { font-size: 0.6rem; color: var(--info); margin-bottom: 3px; text-transform: uppercase; }
    .section { margin-top: 32px; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .section-desc { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 14px; }
    .nodevice-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .nodevice-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px; }
    .nodevice-name { font-weight: 600; font-size: 0.8rem; margin-bottom: 2px; }
    .nodevice-examples { font-size: 0.7rem; color: var(--text-dim); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; visibility: hidden; transition: all 0.2s; padding: 20px; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 460px; max-height: 85vh; overflow-y: auto; transform: scale(0.95); transition: transform 0.2s; }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal-header { padding: 14px 14px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .modal-flag { width: 26px; height: 18px; border-radius: 2px; }
    .modal-close { background: none; border: none; color: var(--text-mute); font-size: 1.2rem; cursor: pointer; }
    .modal-body { padding: 14px; }
    .modal-section { margin-bottom: 14px; }
    .modal-section:last-child { margin-bottom: 0; }
    .modal-section h3 { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 7px; }
    .modal-section p, .modal-section li { color: var(--text-dim); font-size: 0.8rem; line-height: 1.5; }
    .modal-list { list-style: none; font-size: 0.75rem; }
    .modal-list li { padding: 5px 0; border-bottom: 1px solid var(--border); }
    .modal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; }
    .modal-stat { background: var(--bg-card); padding: 8px; border-radius: var(--radius); }
    .modal-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .modal-stat-label { font-size: 0.6rem; color: var(--text-mute); }
    .modal-link { margin-top: 10px; }
    .modal-link a { display: inline-flex; align-items: center; gap: 5px; padding: 8px 12px; background: var(--accent); color: var(--bg); text-decoration: none; border-radius: 5px; font-weight: 500; font-size: 0.75rem; }
    @media (max-width: 600px) { .container { padding: 20px 12px; } .cards { grid-template-columns: 1fr; } }
    .loading { text-align: center; padding: 40px; color: var(--text-dim); }
    .disclaimer { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 16px; font-size: 0.7rem; color: var(--text-dim); }
    .exec-summary { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 20px; }
    .exec-summary h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 12px; }
    .exec-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .exec-stat { background: var(--bg-card); border-radius: var(--radius); padding: 12px; }
    .exec-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 600; color: var(--accent); }
    .exec-stat-label { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
    .exec-insights { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .exec-insight { background: var(--bg-card); border-radius: var(--radius); padding: 10px; font-size: 0.75rem; color: var(--text-dim); border-left: 3px solid var(--accent); }
    .exec-insight strong { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="pageTitle">Global Digital ID Landscape</h1>
      <p class="subtitle" id="pageSubtitle">Loading...</p>
      <div class="stats" id="statsBar"></div>
    </header>
    <div class="disclaimer" id="disclaimer"></div>
    <div class="exec-summary" id="execSummary" style="display:none;">
      <h2>Executive Summary</h2>
      <div class="exec-grid" id="execGrid"></div>
      <div class="exec-insights" id="execInsights"></div>
    </div>
    <div class="filters-bar" id="filters"></div>
    <div class="legend" id="legend"></div>
    <div class="cards" id="cards"></div>
    <div class="section" id="nodeviceSection"></div>
  </div>
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModal()">x</button>
      </div>
      <div class="modal-body">
        <div class="modal-section"><p id="modalDesc"></p></div>
        <div class="modal-section"><h3>Technology</h3><p id="modalTech"></p></div>
        <div class="modal-section"><h3>Details</h3><ul class="modal-list" id="modalDetails"></ul></div>
        <div class="modal-section"><h3>No-Device</h3><ul class="modal-list" id="modalNoDevice"></ul></div>
        <div class="modal-section"><h3>Metrics</h3><div class="modal-grid" id="modalStats"></div></div>
        <div class="modal-section" id="modalLinkSection"><div class="modal-link"><a id="modalLink" href="#" target="_blank">Visit Website</a></div></div>
      </div>
    </div>
  </div>
  <script>
    let appData = null;
    let filter = 'all', model = 'all', region = 'all';
    
    async function loadData() {
      try {
        const resp = await fetch('data.json');
        appData = await resp.json();
        initApp();
      } catch(e) {
        document.getElementById('cards').innerHTML = '<div class="loading">Error loading data.json. Make sure you are running from a local server.</div>';
      }
    }
    
    function initApp() {
      document.getElementById('pageTitle').textContent = appData.meta.title;
      document.getElementById('pageSubtitle').textContent = appData.meta.description;
      
      // Stats
      const stats = appData.stats;
      let statsHtml = '';
      if (stats.countries) statsHtml += '<div class="stat"><span class="stat-value">'+stats.countries+'</span><span class="stat-label">Countries</span></div>';
      if (stats.subnationals) statsHtml += '<div class="stat"><span class="stat-value">'+stats.subnationals+'</span><span class="stat-label">Subnationals</span></div>';
      if (stats.euDeadline) statsHtml += '<div class="stat"><span class="stat-value">'+stats.euDeadline+'</span><span class="stat-label">EU Deadline</span></div>';
      document.getElementById('statsBar').innerHTML = statsHtml;
      
      // Legend
      document.getElementById('legend').innerHTML = `
        <div class="legend-item"><span class="legend-dot prod"></span> Production</div>
        <div class="legend-item"><span class="legend-dot spec"></span> In Development</div>
      `;
      
      // Disclaimer
      document.getElementById('disclaimer').textContent = `Based on publicly available information as of ${appData.meta.lastUpdated}.`;
      
      // Executive Summary
      const jur = appData.jurisdictions;
      const total = jur.length;
      const production = jur.filter(j => j.status === 'production').length;
      const development = jur.filter(j => j.status === 'development').length;
      const regions = {};
      jur.forEach(j => { regions[j.region] = (regions[j.region] || 0) + 1; });
      const models = {};
      jur.forEach(j => { models[j.issuanceModel] = (models[j.issuanceModel] || 0) + 1; });
      const noDevice = jur.filter(j => j.nodevice && j.nodevice.length > 0).length;
      
      document.getElementById('execGrid').innerHTML = `
        <div class="exec-stat"><div class="exec-stat-value">${total}</div><div class="exec-stat-label">Jurisdictions Tracked</div></div>
        <div class="exec-stat"><div class="exec-stat-value">${production}</div><div class="exec-stat-label">In Production</div></div>
        <div class="exec-stat"><div class="exec-stat-value">${development}</div><div class="exec-stat-label">In Development</div></div>
        <div class="exec-stat"><div class="exec-stat-value">${noDevice}</div><div class="exec-stat-label">Offer Non-Digital Options</div></div>
      `;
      
      const regionLabels = { eu: 'Europe', apac: 'Asia-Pacific', na: 'Americas', mea: 'Middle East/Africa' };
      const topRegions = Object.entries(regions).sort((a,b) => b[1]-a[1]).slice(0,3);
      const topModels = Object.entries(models).sort((a,b) => b[1]-a[1]);
      
      let insightsHtml = '';
      insightsHtml += `<div class="exec-insight"><strong>${production > development ? 'Production leads' : 'Most still developing'}</strong> — ${production} live systems vs ${development} in development</div>`;
      if (topRegions.length) insightsHtml += `<div class="exec-insight"><strong>Top regions</strong> — ${topRegions.map(([r,c]) => (regionLabels[r]||r)+': '+c).join(', ')}</div>`;
      if (topModels.length) insightsHtml += `<div class="exec-insight"><strong>Issuance models</strong> — ${topModels.map(([m,c]) => m.charAt(0).toUpperCase()+m.slice(1)+': '+c).join(', ')}</div>`;
      insightsHtml += `<div class="exec-insight"><strong>EU Deadline</strong> — All 27 member states must issue wallets by end of ${appData.stats.euDeadline || '2026'}</div>`;
      insightsHtml += `<div class="exec-insight"><strong>Scale</strong> — Systems cover ~${appData.stats.users || '1.4B'} users globally</div>`;
      
      document.getElementById('execInsights').innerHTML = insightsHtml;
      document.getElementById('execSummary').style.display = 'block';
      
      renderFilters();
      renderCards();
    }
    
    function renderFilters() {
      const regions = [...new Set(appData.jurisdictions.map(j => j.region))];
      document.getElementById('filters').innerHTML = `
        <span class="filter-label">Status:</span>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="production">Production</button>
          <button class="filter-btn" data-filter="development">In Development</button>
        </div>
        <span class="filter-label">Region:</span>
        <div class="filter-group">
          <button class="filter-btn active" data-region="all">All</button>
          ${regions.map(r => `<button class="filter-btn" data-region="${r}">${r.toUpperCase()}</button>`).join('')}
        </div>
      `;
      document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.onclick = () => {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); filter = b.dataset.filter; renderCards();
      });
      document.querySelectorAll('.filter-btn[data-region]').forEach(b => b.onclick = () => {
        document.querySelectorAll('.filter-btn[data-region]').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); region = b.dataset.region; renderCards();
      });
    }
    
    function renderCards() {
      const filtered = appData.jurisdictions.filter(j => {
        const f = filter === 'all' || j.status === filter;
        const r = region === 'all' || j.region === region;
        return f && r;
      }).sort((a, b) => {
        if (a.isSubnational !== b.isSubnational) return a.isSubnational ? 1 : -1;
        if (a.isSubnational && a.parent !== b.parent) return a.parent.localeCompare(b.parent);
        return a.name.localeCompare(b.name);
      });
      
      document.getElementById('cards').innerHTML = `<div style="grid-column: 1/-1; margin-bottom: 12px; color: var(--text-dim); font-size: 0.75rem;">Showing ${filtered.length} jurisdictions</div>` + filtered.map(j => `
        <div class="card ${j.isSubnational ? 'is-subnational' : ''}" onclick="openModal('${j.name.replace(/'/g, "\\'")}')">
          <div class="card-header">
            <div class="card-title-group">
              <img class="card-flag" src="flags/${j.flag}.png" alt="${j.name}">
              <div>
                <div class="card-title">${j.name}</div>
                <div class="card-subtitle">${j.isSubnational ? j.parent : j.technology}</div>
              </div>
            </div>
            <div class="card-badges">
              <span class="badge ${j.status === 'production' ? 'badge-prod' : 'badge-spec'}">${j.status === 'production' ? 'Live' : 'Dev'}</span>
              ${j.isSubnational ? '<span class="badge badge-sub">Sub</span>' : ''}
            </div>
          </div>
          ${j.isSubnational ? `<div class="parent-jurisdiction">${j.parent}</div>` : ''}
          <div class="card-model"><strong>${j.issuanceModel === 'multiple' ? 'Multiple IDs' : j.issuanceModel === 'cloud' ? 'Cloud account' : 'One ID'}</strong></div>
          <div class="card-desc">${j.description.substring(0, 90)}...</div>
          <div class="card-meta">${j.metrics.slice(0, 2).map(m => `<span>${m.label}: <strong>${m.value}</strong></span>`).join('')}</div>
        </div>
      `).join('');
    }
    
    window.openModal = function(name) {
      const j = appData.jurisdictions.find(x => x.name === name);
      if (!j) return;
      document.getElementById('modalTitle').innerHTML = `<img class="modal-flag" src="flags/${j.flag}.png"> ${j.name}`;
      document.getElementById('modalDesc').textContent = j.description;
      document.getElementById('modalTech').textContent = j.technology;
      document.getElementById('modalDetails').innerHTML = j.details.map(d => `<li>${d}</li>`).join('');
      document.getElementById('modalNoDevice').innerHTML = j.nodevice.map(n => `<li>${n}</li>`).join('');
      document.getElementById('modalStats').innerHTML = j.metrics.map(m => `<div class="modal-stat"><div class="modal-stat-value">${m.value}</div><div class="modal-stat-label">${m.label}</div></div>`).join('');
      if (j.url) { document.getElementById('modalLink').href = j.url; document.getElementById('modalLinkSection').style.display = 'block'; }
      else document.getElementById('modalLinkSection').style.display = 'none';
      document.getElementById('modal').classList.add('active');
    };
    window.closeModal = function() { document.getElementById('modal').classList.remove('active'); };
    document.getElementById('modal').onclick = e => { if(e.target.id === 'modal') closeModal(); };
    document.onkeydown = e => { if(e.key === 'Escape') closeModal(); };
    loadData();
  </script>
</body>
</html>
