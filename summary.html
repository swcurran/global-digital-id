<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Executive Summary — Global Digital ID Landscape</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <style>
    :root {
      --bg: #0c0c0f;
      --bg-elevated: #141418;
      --border: #2a2a32;
      --text: #e8e8ec;
      --text-dim: #8a8a96;
      --accent: #e8c547;
      --success: #4ade80;
      --warning: #fbbf24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 40px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    h1 { font-size: 2rem; margin-bottom: 8px; letter-spacing: -0.02em; }
    .subtitle { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 40px; }
    
    .back { color: var(--accent); text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 24px; }
    .back:hover { text-decoration: underline; }
    
    /* Key Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 48px;
    }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    .stat-value { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }
    
    /* Insights */
    .section { margin-bottom: 40px; }
    .section-title { 
      font-size: 1.1rem; 
      font-weight: 600; 
      margin-bottom: 16px; 
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .insight-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 12px;
      border-left: 4px solid var(--accent);
    }
    .insight-card h3 { font-size: 1rem; margin-bottom: 6px; }
    .insight-card p { color: var(--text-dim); font-size: 0.9rem; }
    
    /* Key Systems */
    .systems-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 12px;
    }
    .system-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .system-flag img { width: 28px; height: 20px; border-radius: 2px; }
    .system-info { flex: 1; }
    .system-name { font-weight: 600; font-size: 0.95rem; }
    .system-status {
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .system-status.prod { background: rgba(74,222,128,0.15); color: var(--success); }
    .system-status.dev { background: rgba(251,191,36,0.15); color: var(--warning); }
    .system-model { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
    
    /* Model breakdown */
    .model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
    @media (max-width: 600px) { .model-grid { grid-template-columns: 1fr; } }
    .model-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .model-title { font-weight: 600; font-size: 1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .model-count { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .model-desc { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }
    .model-examples { font-size: 0.75rem; color: var(--accent); margin-top: 8px; }
    
    /* Tech Stack breakdown */
    .tech-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 40px; }
    .tech-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .tech-count { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .tech-name { font-size: 0.9rem; font-weight: 600; margin-top: 4px; }
    .tech-desc { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }
    
    /* No-device */
    .nodevice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .nodevice-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .nodevice-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .nodevice-desc { font-size: 0.75rem; color: var(--text-dim); }
    .nodevice-examples { font-size: 0.7rem; color: var(--accent); margin-top: 6px; }
    .nodevice-summary { font-size: 0.75rem; color: var(--text-dim); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    
    /* Footer */
    .footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← Back to Registry</a>
    
    <h1>Global Digital ID Landscape</h1>
    <p class="subtitle">Executive Summary — At a Glance</p>
    
    <!-- Key Stats -->
    <div class="stats-grid" id="stats"></div>
    
    <!-- Credential Models -->
    <div class="section">
      <h2 class="section-title">Issuance Models</h2>
      <div class="model-grid" id="models"></div>
    </div>
    
    <!-- Tech Stack -->
    <div class="section">
      <h2 class="section-title">Technology Stack</h2>
      <div class="tech-grid" id="techStack"></div>
    </div>
    
    <!-- Key Insights -->
    <div class="section">
      <h2 class="section-title">Key Insights</h2>
      <div id="insights"></div>
    </div>
    
    <!-- Notable Systems -->
    <div class="section">
      <h2 class="section-title">Notable Systems</h2>
      <div class="systems-grid" id="systems"></div>
    </div>
    
    <!-- No-Device Solutions -->
    <div class="section">
      <h2 class="section-title">Non-Digital Access Options</h2>
      <div class="nodevice-grid" id="nodevice"></div>
    </div>
    
    <div class="footer" id="footer"></div>
  </div>

  <script>
    const flags = { au:'🇦🇺', br:'🇧🇷', cn:'🇨🇳', de:'🇩🇪', ee:'🇪🇪', es:'🇪🇸', eu:'🇪🇺', fr:'🇫🇷', gb:'🇬🇧', in:'🇮🇳', il:'🇮🇱', it:'🇮🇹', ke:'🇰🇪', kr:'🇰🇷', my:'🇲🇾', ng:'🇳🇬', nl:'🇳🇱', om:'🇴🇲', pt:'🇵🇹', qa:'🇶🇦', sa:'🇸🇦', sg:'🇸🇬', se:'🇸🇪', tw:'🇹🇼', ae:'🇦🇪', us:'🇺🇸', ca:'🇨🇦' };
    
    function getFlag(code) {
      return `<img src="https://flagcdn.com/w40/${code}.png" srcset="https://flagcdn.com/w80/${code}.png 2x" alt="${code.toUpperCase()}" style="width:28px;height:20px;border-radius:2px;vertical-align:middle;">`;
    }
    
    async function loadData() {
      const resp = await fetch('data.json');
      const data = await resp.json();
      render(data);
    }
    
    function render(data) {
      const jur = data.jurisdictions;
      const total = jur.length;
      const production = jur.filter(j => j.status === 'production').length;
      const development = jur.filter(j => j.status === 'development').length;
      const regions = [...new Set(jur.map(j => j.region))].length;
      
      // Stats
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Jurisdictions</div></div>
        <div class="stat-card"><div class="stat-value">${production}</div><div class="stat-label">Live Systems</div></div>
        <div class="stat-card"><div class="stat-value">${regions}</div><div class="stat-label">Regions</div></div>
        <div class="stat-card"><div class="stat-value">${data.stats.users || '1.4B'}</div><div class="stat-label">Users Covered</div></div>
      `;
      
      // Issuance model breakdown
      const models = { single: 0, multiple: 0, cloud: 0 };
      const modelExamples = { single: [], multiple: [], cloud: [] };
      jur.forEach(j => {
        if (models[j.issuanceModel] !== undefined) {
          models[j.issuanceModel]++;
          if (modelExamples[j.issuanceModel].length < 5) {
            modelExamples[j.issuanceModel].push(j.name);
          }
        }
      });
      
      document.getElementById('models').innerHTML = `
        <div class="model-card">
          <div class="model-title"><span>🏛️</span> Single Issuer</div>
          <div class="model-count">${models.single}</div>
          <div class="model-desc">Government issues one credential per person</div>
          <div class="model-examples">${modelExamples.single.join(', ')}</div>
        </div>
        <div class="model-card">
          <div class="model-title"><span>☁️</span> Cloud-Based</div>
          <div class="model-count">${models.cloud}</div>
          <div class="model-desc">Browser/app-based, no physical credential</div>
          <div class="model-examples">${modelExamples.cloud.join(', ')}</div>
        </div>
        <div class="model-card">
          <div class="model-title"><span>🔑</span> Multiple Providers</div>
          <div class="model-count">${models.multiple}</div>
          <div class="model-desc">Multiple issuers (banks, telcos) provide credentials</div>
          <div class="model-examples">${modelExamples.multiple.join(', ')}</div>
        </div>
      `;
      
      // Tech stack breakdown
      const techCounts = {};
      jur.forEach(j => {
        if (j.techStack) {
          j.techStack.forEach(t => {
            techCounts[t] = (techCounts[t] || 0) + 1;
          });
        }
      });
      
      const techLabels = {
        'PKI': { icon: '🔐', desc: 'Certificate-based authentication' },
        'Biometric (fingerprint/iris)': { icon: '👆', desc: 'Fingerprint or iris scanning' },
        'Biometric': { icon: '👆', desc: 'Fingerprint, iris, or facial recognition' },
        'OIDC': { icon: '🔓', desc: 'OpenID Connect protocol' },
        'ISO 18013-5': { icon: '📱', desc: 'Mobile Driver License standard' },
        'Verifiable Credentials': { icon: '📄', desc: 'W3C verifiable credentials' },
        'FIDO2': { icon: '🛡️', desc: 'Passwordless authentication' },
        'NFC': { icon: '📳', desc: 'Tap to authenticate' },
        'QR Code': { icon: '⬛', desc: 'QR-based credential presentation' },
        'Central Database': { icon: '🗄️', desc: 'Government-managed identity database' },
        'OAuth 2.0': { icon: '🔓', desc: 'Authorization framework' },
        'Facial recognition': { icon: '👤', desc: 'Face authentication' },
        'OTP': { icon: '📱', desc: 'One-time password' },
        'X-Road': { icon: '🛣️', desc: 'Data exchange layer' },
        'Mobile-ID': { icon: '📱', desc: 'Mobile SIM-based authentication' },
        'Smart-ID': { icon: '📱', desc: 'App-based authentication' },
        'eIDAS': { icon: '🇪🇺', desc: 'EU electronic ID framework' },
        'OpenID4VP': { icon: '🔓', desc: 'Verifiable Presentations' },
        'W3C Verifiable Credentials': { icon: '📄', desc: 'Digital credential standard' },
        'SAML': { icon: '🔐', desc: 'Security assertion markup' },
        'REST API': { icon: '🔗', desc: 'API-based integration' },
        'WeChat integration': { icon: '💬', desc: 'WeChat platform integration' },
        'MyInfo': { icon: '📋', desc: 'Singapore citizen data platform' },
        'SingPass app': { icon: '🇸🇬', desc: 'Singapore authentication app' },
        'QR login': { icon: '⬛', desc: 'QR code login' },
        'Mobile certificate': { icon: '📜', desc: 'Certificate on mobile device' },
        'BankID': { icon: '🏦', desc: 'Bank-issued authentication' },
        'Wallet app': { icon: '👛', desc: 'Digital wallet application' },
        'GOV.UK Wallet': { icon: '🇬🇧', desc: 'UK government wallet' },
        'Trust framework': { icon: '📋', desc: 'Trust framework for identity' },
        'Attribute sharing': { icon: '🔄', desc: 'Selective attribute disclosure' }
      };
      
      const topTech = Object.entries(techCounts).sort((a,b) => b[1]-a[1]).slice(0, 6);
      
      document.getElementById('techStack').innerHTML = topTech.map(([tech, count]) => {
        const info = techLabels[tech] || { icon: '⚙️', desc: '' };
        return `
          <div class="tech-card">
            <div class="tech-count">${count}</div>
            <div class="tech-name">${info.icon} ${tech}</div>
            <div class="tech-desc">${info.desc}</div>
          </div>
        `;
      }).join('');
      
      // Insights
      const regionCounts = {};
      jur.forEach(j => regionCounts[j.region] = (regionCounts[j.region] || 0) + 1);
      const topRegion = Object.entries(regionCounts).sort((a,b) => b[1]-a[1])[0];
      const regionNames = { eu: 'Europe', apac: 'Asia-Pacific', na: 'Americas', me: 'Middle East', africa: 'Africa' };
      
      // Get issuance model counts
      const modelCounts = { single: 0, multiple: 0, cloud: 0 };
      jur.forEach(j => {
        if (modelCounts[j.issuanceModel] !== undefined) {
          modelCounts[j.issuanceModel]++;
        }
      });
      
      document.getElementById('insights').innerHTML = `
        <div class="insight-card">
          <h3>🇪🇺 EU Deadline: Catalyst for Change</h3>
          <p>All 27 EU member states must offer EUDI Wallets by Dec 2026. Each wallet can hold credentials from <strong>multiple issuers</strong> (national ID, driving license, bank, university) — enabling true multi-credential portability across the EU.</p>
        </div>
        <div class="insight-card">
          <h3>📱 Catalyst: Mobile-first Adoption</h3>
          <p>US mDL rollouts (14+ states in Apple/Google Wallet) and TSA acceptance are driving mainstream digital credential use beyond government services.</p>
        </div>
        <div class="insight-card">
          <h3>🏛️ Issuance Models: Single vs Multiple</h3>
          <p>Most jurisdictions (${modelCounts.single}) use single issuer (one credential per person). Only ${modelCounts.multiple} use multiple providers (Estonia, Sweden, Finland, EUDI) where banks/telcos issue credentials.</p>
        </div>
        <div class="insight-card">
          <h3>📊 Current State: ${production} Live vs ${development} In Development</h3>
          <p>Most jurisdictions have moved beyond pilots to production.</p>
        </div>
      `;
      
      // Notable systems
      const notable = jur.filter(j => 
        j.name === 'India' || j.name === 'European Union' || j.name === 'Estonia' || 
        j.name === 'Brazil' || j.name === 'Singapore' || j.name === 'United Kingdom' ||
        j.name === 'British Columbia' || j.name === 'China' || j.name === 'Sweden'
      );
      
      document.getElementById('systems').innerHTML = notable.map(j => {
        const metrics = j.metrics ? j.metrics.map(m => `${m.value}`).join(' · ') : '';
        const modelLabel = j.issuanceModel === 'single' ? 'Single Issuer' : j.issuanceModel === 'multiple' ? 'Multiple' : 'Cloud';
        return `
        <div class="system-card">
          <span class="system-flag">${getFlag(j.flag)}</span>
          <div class="system-info">
            <div class="system-name">${j.name}</div>
            <div class="system-model">${modelLabel}</div>
            ${metrics ? `<div style="font-size: 0.75rem; color: var(--accent); margin-top: 4px">${metrics}</div>` : ''}
          </div>
          <span class="system-status ${j.status === 'production' ? 'prod' : 'dev'}">${j.status}</span>
        </div>
      `}).join('');
      
      // No-device solutions
      const nodevice = data.nodeviceSolutions || [];
      document.getElementById('nodevice').innerHTML = nodevice.map(n => `
        <div class="nodevice-card">
          <div class="nodevice-name">${n.name}</div>
          <div class="nodevice-desc">${n.description}</div>
          <div class="nodevice-examples">${n.examples.join(', ')}</div>
        </div>
      `).join('');
      
      // Add summary of physical card types
      const nodeviceCounts = { physical: 0, chip_qr: 0, paper: 0, in_person: 0, other: 0 };
      jur.forEach(j => {
        const nd = j.nodevice || [];
        if (!nd.length) return;
        const hasChipQR = nd.some(n => n.includes('QR') || n.toLowerCase().includes('chip') || n.includes('Code card'));
        const hasPhysical = nd.some(n => n.toLowerCase().includes('physical') || n.toLowerCase().includes('card') || n.toLowerCase().includes('license'));
        const hasPaper = nd.some(n => n.toLowerCase().includes('slip') || n.toLowerCase().includes('paper'));
        const hasInPerson = nd.some(n => n.toLowerCase().includes('kiosk') || n.toLowerCase().includes('centre') || n.toLowerCase().includes('center') || n.toLowerCase().includes('registry') || n.toLowerCase().includes('service bc'));
        
        if (hasChipQR) nodeviceCounts.chip_qr++;
        else if (hasPhysical) nodeviceCounts.physical++;
        if (hasPaper) nodeviceCounts.paper++;
        if (hasInPerson) nodeviceCounts.in_person++;
      });
      
      document.getElementById('nodevice').innerHTML += `
        <div class="nodevice-summary">
          <strong>Summary:</strong> ${nodeviceCounts.physical} with physical cards · ${nodeviceCounts.chip_qr} with chip/QR on card · ${nodeviceCounts.paper} with paper alternatives · ${nodeviceCounts.in_person} with in-person options
        </div>
      `;
      
      // Footer
      document.getElementById('footer').textContent = `Based on publicly available information as of ${data.meta.lastUpdated}. Prepared for ${data.meta.preparedFor}.`;
    }
    
    loadData();
  </script>
</body>
</html>
